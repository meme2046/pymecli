mixed-port: 7897
allow-lan: false
mode: rule
log-level: warning
external-controller: "127.0.0.1:9097"
client-fingerprint: chrome
unified-delay: true
ipv6: false
profile:
  store-selected: true
tun:
  mtu: 1500
dns:
  enable: true
  listen: ":53"
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter-mode: "blacklist"
  prefer-h3: false
  respect-rules: false # 是否让 DNS 解析遵循路由规则
  use-hosts: true # 启用本地 hosts
  use-system-hosts: true # 启用系统 hosts
  ipv6: false
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
    - "ipv6.shuzilm.cn"
    - "+.qq.com"
    - "+.tgp.qq.com"
    - "+.klei.com"
    - "+.steamserver.net"
    - "dontstarve_rail_x64.exe"
  default-nameserver: # 默认 DNS 服务器
    - "223.5.5.5" # 阿里云 DNS（国内）
    - "8.8.8.8" # Google DNS（国外）
    - "2400:3200::1" # 阿里云 IPv6 DNS
    - "2001:4860:4860::8888" # Google IPv6 DNS
  nameserver:
    - "8.8.8.8" # Google DNS（UDP 协议）
    - "https://doh.pub/dns-query" # 公共 DoH DNS（加密解析，防污染）
    - "https://dns.alidns.com/dns-query" # 阿里云 DoH DNS（国内稳定）
  fallback: []
  fallback-filter:
    geoip: true
    geoip-code: "CN"
    ipcidr:
      - "240.0.0.0/4"
      - "0.0.0.0/32"
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
  proxy-server-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"
    - "tls://223.5.5.5"
  direct-nameserver-follow-policy: false # 直连域名的 DNS 不遵循代理规则
  direct-nameserver: []
external-controller-cors:
  allow-private-network: true
  allow-origins:
    - "*"
proxies: []
proxy-providers: {}
proxy-groups: []
rule-providers: {}
rules: []
